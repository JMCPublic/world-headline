name: Weekly Story Refresh

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:
    inputs:
      country:
        description: 'Country slug to refresh (leave blank for all)'
        required: false
        default: ''

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic feedparser

      - name: Run refresh script
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          COUNTRY_FILTER: ${{ inputs.country }}
        run: python scripts/refresh_stories.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Weekly story refresh $(date +'%Y-%m-%d')"
          git push
